<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chicago Concerts</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      padding: 2rem 1rem;
    }
    header {
      max-width: 900px;
      margin: 0 auto 2.5rem;
      border-bottom: 1px solid #333;
      padding-bottom: 1.25rem;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #f5f5f5;
    }
    header p {
      margin-top: 0.4rem;
      color: #888;
      font-size: 0.9rem;
    }
    .venues {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }
    .venue {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      overflow: hidden;
    }
    .venue-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #2a2a2a;
    }
    .venue-header h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #f0f0f0;
    }
    .venue-header a {
      font-size: 0.8rem;
      color: #888;
      text-decoration: none;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 0.2rem 0.6rem;
      transition: color 0.15s, border-color 0.15s;
    }
    .venue-header a:hover { color: #ccc; border-color: #555; }
    iframe {
      display: block;
      width: 100%;
      border: none;
    }
    footer {
      max-width: 900px;
      margin: 3rem auto 0;
      text-align: center;
      font-size: 0.8rem;
      color: #555;
    }
  </style>
</head>
<body>
  <header>
    <h1>Chicago Concerts</h1>
    <p>Upcoming shows at Chicago venues — playlists updated weekly</p>
  </header>

  <div class="venues">

    <div class="venue">
      <div class="venue-header">
        <h2>Schubas / Lincoln Hall</h2>
        <a href="https://www.lh-st.com/shows/" target="_blank" rel="noopener">All shows ↗</a>
      </div>
      <iframe src="https://open.spotify.com/embed/playlist/2U2905zrSa7d0srhj5UQPl?utm_source=generator&theme=0"
        height="380" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy"></iframe>
    </div>

    <div class="venue">
      <div class="venue-header">
        <h2>Empty Bottle</h2>
        <a href="https://www.emptybottle.com" target="_blank" rel="noopener">All shows ↗</a>
      </div>
      <iframe src="https://open.spotify.com/embed/playlist/064CP2pebRQJ8JxkBz1o8Q?utm_source=generator&theme=0"
        height="380" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy"></iframe>
    </div>

    <div class="venue">
      <div class="venue-header">
        <h2>Thalia Hall</h2>
        <a href="https://www.thaliahall.com/shows/" target="_blank" rel="noopener">All shows ↗</a>
      </div>
      <iframe src="https://open.spotify.com/embed/playlist/7M4rtfRDVTNly3zZFPK90n?utm_source=generator&theme=0"
        height="380" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy"></iframe>
    </div>

    <div class="venue">
      <div class="venue-header">
        <h2>Riviera Theatre</h2>
        <a href="https://www.rivieratheatre.com/events" target="_blank" rel="noopener">All shows ↗</a>
      </div>
      <iframe src="https://open.spotify.com/embed/playlist/5de0c0jgd4tmc8hJuTA7Cz?utm_source=generator&theme=0"
        height="380" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy"></iframe>
    </div>

    <div class="venue">
      <div class="venue-header">
        <h2>Subterranean</h2>
        <a href="https://www.subt.net" target="_blank" rel="noopener">All shows ↗</a>
      </div>
      <iframe src="https://open.spotify.com/embed/playlist/6PF0qVIeU7r1dOOhceq2g4?utm_source=generator&theme=0"
        height="380" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy"></iframe>
    </div>

    <div class="venue">
      <div class="venue-header">
        <h2>Salt Shed</h2>
        <a href="https://www.saltshedchicago.com/home#shows" target="_blank" rel="noopener">All shows ↗</a>
      </div>
      <iframe src="https://open.spotify.com/embed/playlist/6DsSykZfubhHNkMFOWMiKC?utm_source=generator&theme=0"
        height="380" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy"></iframe>
    </div>

  </div>

  <footer>
    Playlists updated every Monday &nbsp;·&nbsp; <a href="https://github.com/sethch/chicago-concerts" style="color:#555;" target="_blank" rel="noopener">GitHub</a>
  </footer>
</body>
</html>
